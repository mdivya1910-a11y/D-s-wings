<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>White Pigeon</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#0a1630, #000);
}

/* FLOAT */
.bird {
  width: 200px;
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 10px white);
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* WINGS */
.wing {
  transform-origin: center;
  animation: flap 1s infinite ease-in-out;
}

@keyframes flap {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(15deg); }
}

/* BUTTON */
.btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  padding: 12px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<svg class="bird" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="30" fill="white"/>
  <ellipse class="wing" cx="70" cy="100" rx="30" ry="15" fill="white"/>
  <ellipse class="wing" cx="130" cy="100" rx="30" ry="15" fill="white"/>
</svg>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="btn" onclick="toggleMusic()">🎵</div>

<script>
const music = document.getElementById("music");
function toggleMusic() {
  if (music.paused) music.play();
  else music.pause();
}
</script>

</body>
</html>
