<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  color: white;
  background: linear-gradient(180deg, #050814, #0a1630, #05060a);
  overflow-x: hidden;
}

/* CLOUDS */
.cloud {
  position: fixed;
  background: rgba(255,255,255,0.12);
  border-radius: 50%;
  filter: blur(18px);
  z-index: 0;
}

.c1 { width: 180px; height: 60px; top: 15%; left: -200px; animation: move 80s linear infinite; }
.c2 { width: 240px; height: 70px; top: 45%; left: -300px; animation: move 110s linear infinite; }
.c3 { width: 160px; height: 50px; top: 70%; left: -250px; animation: move 95s linear infinite; }

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(150vw); }
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

/* cinematic sweep */
.hero::after {
  content: "";
  position: absolute;
  width: 40%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
  transform: rotate(25deg);
  animation: sweep 7s ease-in-out;
}

@keyframes sweep {
  0% { transform: translateX(-200%) rotate(25deg); }
  100% { transform: translateX(200%) rotate(25deg); }
}

/* QUOTE */
.quote {
  font-size: 22px;
  margin-bottom: 25px;
  opacity: 0;
  animation: fadeIn 2.5s forwards;
  max-width: 700px;
  padding: 0 20px;
}

@keyframes fadeIn {
  to { opacity: 0.9; }
}

/* BIRD */
.bird {
  width: 260px;
  animation: float 4s ease-in-out infinite, pop 1.8s ease forwards;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

@keyframes pop {
  from { opacity: 0; transform: scale(0.6); }
  to { opacity: 1; transform: scale(1); }
}

/* wings */
.wing {
  animation: flap 1.4s ease-in-out infinite;
  transform-origin: center;
}

@keyframes flap {
  0%,100% { transform: rotate(-5deg); }
  50% { transform: rotate(15deg); }
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  max-width: 900px;
  margin: auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

h2 {
  margin-bottom: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  padding: 12px 14px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  z-index: 10;
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.2); }
  50% { box-shadow: 0 0 20px 6px rgba(255,255,255,0.12); }
  100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.2); }
}
</style>
</head>

<body>

<!-- CLOUDS -->
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<!-- HERO -->
<div class="hero">

  <div class="quote">
    “She took the leap and built her wings on the way down.”
  </div>

  <!-- CLEAN HAPPY PIGEON -->
  <svg class="bird" viewBox="0 0 200 200">

    <!-- body -->
    <ellipse cx="100" cy="110" rx="26" ry="38" fill="white"/>

    <!-- head -->
    <circle cx="122" cy="88" r="10" fill="white"/>

    <!-- beak -->
    <polygon points="132,88 148,92 132,96" fill="white"/>

    <!-- eye -->
    <circle cx="124" cy="86" r="2" fill="black"/>

    <!-- wings -->
    <ellipse class="wing" cx="80" cy="112" rx="32" ry="18" fill="white"/>
    <ellipse class="wing" cx="120" cy="112" rx="32" ry="18" fill="white"/>

  </svg>

</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Me</h2>
  <p style="opacity:0.85;">
    Divya Prakash Mundkar<br>
    Computer Engineer | Creative Developer<br>
    I build cinematic web experiences using HTML, CSS & SVG.
  </p>
</div>

<!-- PROJECTS -->
<div class="section">
  <h2>My Creation</h2>

  <div class="card">
    <h3>My Wings</h3>
    <p>Cinematic animated SVG project</p>
    <a href="https://mdivya1910-a11y.github.io/My-wings/" target="_blank" style="color:#66ccff;">
      View Project →
    </a>
  </div>
</div>

<!-- FOOTER -->
<div class="section">
  <p style="opacity:0.6;">Built by M. Divya ✨</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btn">
🎵 click me
</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("btn");

const key = "global_music";

window.addEventListener("load", () => {
  if (localStorage.getItem(key) === "playing") {
    music.play();
    btn.innerText = "⏸ click me";
  }
});

function toggleMusic() {
  if (music.paused) {
    music.play();
    localStorage.setItem(key, "playing");
    btn.innerText = "⏸ click me";
  } else {
    music.pause();
    localStorage.setItem(key, "paused");
    btn.innerText = "🎵 click me";
  }
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) music.pause();
});
</script>

</body>
</html>
