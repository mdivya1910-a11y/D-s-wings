<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
body {
  margin: 0;
  color: white;
  font-family: system-ui, Arial;
  overflow-x: hidden;

  background: linear-gradient(180deg, #05070f, #0b1630, #05060a);
}

/* CLOUDS */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  filter: blur(18px);
  animation: moveClouds 40s linear infinite;
}

.cloud1 { width: 180px; height: 60px; top: 15%; left: -200px; }
.cloud2 { width: 240px; height: 70px; top: 45%; left: -300px; animation-duration: 65s; }
.cloud3 { width: 160px; height: 50px; top: 70%; left: -250px; animation-duration: 55s; }

@keyframes moveClouds {
  0% { transform: translateX(0); }
  100% { transform: translateX(140vw); }
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

/* QUOTE */
.quote {
  font-size: clamp(18px, 2.5vw, 26px);
  opacity: 0;
  margin-bottom: 30px;
  max-width: 700px;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 0.9; }
}

/* BIRD (CLEAN CINEMATIC PIGEON) */
.bird {
  width: 260px;
  filter: drop-shadow(0 0 18px rgba(255,255,255,0.25));
  animation: float 4s ease-in-out infinite, reveal 2s ease forwards;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}

@keyframes reveal {
  from { opacity: 0; transform: scale(0.6); }
  to { opacity: 1; transform: scale(1); }
}

/* SIMPLE HAPPY PIGEON STYLE */
.wing {
  transform-origin: center;
  animation: flap 1.4s ease-in-out infinite;
}

@keyframes flap {
  0%,100% { transform: rotate(-3deg); }
  50% { transform: rotate(16deg); }
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  max-width: 900px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
}

.card a {
  color: #66ccff;
  text-decoration: none;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  padding: 12px 14px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;

  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.2); }
  50% { box-shadow: 0 0 18px 6px rgba(255,255,255,0.1); }
  100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.2); }
}
</style>
</head>

<body>

<!-- CLOUDS -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<!-- HERO -->
<div class="hero">

  <div class="quote">
    “She took the leap and built her wings on the way down.”
  </div>

  <!-- CINEMATIC HAPPY BIRD -->
  <svg class="bird" viewBox="0 0 200 200">

    <!-- body -->
    <ellipse cx="100" cy="110" rx="28" ry="38" fill="white"/>

    <!-- head -->
    <circle cx="120" cy="80" r="10" fill="white"/>

    <!-- beak -->
    <path d="M130 82 L145 88 L130 92 Z" fill="white"/>

    <!-- eye -->
    <circle cx="122" cy="78" r="2" fill="black"/>

    <!-- wings -->
    <ellipse class="wing" cx="85" cy="110" rx="30" ry="18" fill="white"/>
    <ellipse class="wing" cx="115" cy="110" rx="30" ry="18" fill="white"/>

  </svg>

</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Me</h2>
  <p style="text-align:center; opacity:0.8;">
    Divya Prakash Mundkar<br>
    Computer Engineer rebuilding her craft.
  </p>
</div>

<!-- PROJECT -->
<div class="section">
  <h2>My Creation</h2>

  <div class="card">
    <h3>My Wings</h3>
    <p>Cinematic SVG animation project</p>
    <a href="https://mdivya1910-a11y.github.io/My-wings/" target="_blank">
      View Project →
    </a>
  </div>

</div>

<div class="footer">
  Built by M. Divya ✨
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btn">
🎵 click me
</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("btn");

music.volume = 0.3;

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.innerHTML = "⏸ click me";
  } else {
    music.pause();
    btn.innerHTML = "🎵 click me";
  }
}
</script>

</body>
</html>
