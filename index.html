<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: system-ui, Arial;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* QUOTE */
.quote {
  font-size: clamp(18px, 2.5vw, 26px);
  opacity: 0.9;
  margin-bottom: 30px;
  max-width: 700px;
  padding: 0 20px;
}

/* BIRD */
.bird {
  width: 240px;
  animation: float 4.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-16px) rotate(1deg); }
}

/* WINGS */
.wing-left {
  transform-origin: 100px 100px;
  animation: flapLeft 1.7s ease-in-out infinite;
}

.wing-right {
  transform-origin: 100px 100px;
  animation: flapRight 1.5s ease-in-out infinite;
}

@keyframes flapLeft {
  0%,100% { transform: rotate(-2deg); }
  50% { transform: rotate(20deg); }
}

@keyframes flapRight {
  0%,100% { transform: rotate(2deg); }
  50% { transform: rotate(-18deg); }
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 12px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  color: white;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <!-- QUOTE -->
  <div class="quote">
    “The cage is open, but it has forgotten how to fly.”
  </div>

  <!-- BIRD -->
  <svg class="bird" viewBox="0 0 200 200">

    <g class="wing-left">
      <path d="M100 100 C35 15, 15 165, 100 125"
            fill="white" opacity="0.75"/>
      <path d="M100 100 C55 35, 35 145, 100 125"
            fill="white" opacity="0.35"/>
    </g>

    <g class="wing-right">
      <path d="M100 100 C165 15, 185 165, 100 125"
            fill="white" opacity="0.75"/>
      <path d="M100 100 C145 35, 165 145, 100 125"
            fill="white" opacity="0.35"/>
    </g>

    <ellipse cx="100" cy="115" rx="18" ry="40" fill="white" opacity="0.08"/>
    <ellipse cx="100" cy="110" rx="10" ry="30" fill="white"/>
    <circle cx="100" cy="80" r="11" fill="white"/>
    <circle cx="103" cy="78" r="2.2" fill="black"/>
    <circle cx="104" cy="77" r="0.7" fill="white"/>

  </svg>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btn">🎵</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("btn");

music.volume = 0.3;

async function toggleMusic() {
  try {
    if (music.paused) {
      await music.play();
      btn.innerText = "⏸";
    } else {
      music.pause();
      btn.innerText = "🎵";
    }
  } catch (e) {
    alert("Click again to enable audio (browser restriction)");
  }
}
</script>

</body>
</html>
