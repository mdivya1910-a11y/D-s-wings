<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: system-ui, Arial;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

/* QUOTE */
.quote {
  font-size: clamp(18px, 2.5vw, 26px);
  opacity: 0.9;
  margin-bottom: 30px;
  max-width: 700px;
  padding: 0 20px;
}

/* BIRD */
.bird {
  width: 260px;
  animation: float 4.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-16px) rotate(1deg); }
}

/* WINGS */
.wing-left {
  transform-origin: 100px 100px;
  animation: flapLeft 1.6s ease-in-out infinite;
}

.wing-right {
  transform-origin: 100px 100px;
  animation: flapRight 1.4s ease-in-out infinite;
}

@keyframes flapLeft {
  0%,100% { transform: rotate(-2deg); }
  50% { transform: rotate(18deg); }
}

@keyframes flapRight {
  0%,100% { transform: rotate(2deg); }
  50% { transform: rotate(-16deg); }
}

/* SECTION */
.section {
  padding: 60px 20px;
  max-width: 900px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 12px;
  padding: 20px;
  border: 1px solid #222;
}

.card a {
  color: #66ccff;
  text-decoration: none;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 12px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  color: white;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.1;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="quote">
    “She took the leap and built her wings on the way down.”
  </div>

  <!-- BIRD -->
  <svg class="bird" viewBox="0 0 200 200">

    <!-- BODY -->
    <path d="M100 60
             C80 70, 70 95, 78 115
             C85 135, 105 145, 118 135
             C130 125, 132 105, 120 90
             C112 78, 110 65, 100 60"
          fill="white"/>

    <!-- HEAD -->
    <circle cx="120" cy="70" r="7" fill="white"/>

    <!-- BEAK -->
    <path d="M127 71 L138 75 L127 78 Z" fill="white"/>

    <!-- EYE -->
    <circle cx="122" cy="69" r="1.6" fill="black"/>

    <!-- LEFT WING -->
    <g class="wing-left">
      <path d="M95 95
               C45 65, 40 115, 90 118
               C70 110, 65 90, 95 95"
            fill="white" opacity="0.95"/>

      <path d="M92 105
               C55 90, 55 120, 88 120
               C70 114, 68 100, 92 105"
            fill="white" opacity="0.6"/>
    </g>

    <!-- RIGHT WING -->
    <g class="wing-right">
      <path d="M105 95
               C155 65, 160 115, 110 118
               C130 110, 135 90, 105 95"
            fill="white" opacity="0.95"/>

      <path d="M108 105
               C145 90, 145 120, 112 120
               C130 114, 132 100, 108 105"
            fill="white" opacity="0.6"/>
    </g>

    <!-- TAIL -->
    <path d="M80 115
             C60 120, 55 130, 75 135
             C85 130, 85 120, 80 115"
          fill="white" opacity="0.9"/>

  </svg>

</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Me</h2>
  <p style="text-align:center; opacity:0.8;">
    Divya Prakash Mundkar<br>
    Computer Engineer rebuilding her craft.<br>
    I create interactive experiences using HTML, CSS & SVG.
  </p>
</div>

<!-- PROJECT -->
<div class="section">
  <h2>Projects</h2>

  <div class="card">
    <h3>My Wings</h3>
    <p>Animated SVG cinematic pigeon project.</p>
    <a href="https://mdivya1910-a11y.github.io/My-wings/" target="_blank">
      View Project →
    </a>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  Built by M. Divya ✨
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btn">
  🎵 <span style="font-size:10px; opacity:0.8;">click me</span>
</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("btn");

music.volume = 0.3;

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.innerText = "⏸ click me";
  } else {
    music.pause();
    btn.innerText = "🎵 click me";
  }
}
</script>

</body>
</html>
