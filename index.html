<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
body {
  margin: 0;
  background: #05070f;
  color: white;
  font-family: system-ui, Arial;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* QUOTE */
.quote {
  font-size: 20px;
  margin-bottom: 30px;
  padding: 0 20px;
  opacity: 0.9;
}

/* BIRD */
.bird {
  width: 220px;
}

/* wings animation */
.wing {
  animation: flap 1.5s infinite ease-in-out;
  transform-origin: center;
}

@keyframes flap {
  0%,100% { transform: rotate(-4deg); }
  50% { transform: rotate(14deg); }
}

/* SECTIONS */
.section {
  padding: 50px 20px;
  max-width: 800px;
  margin: auto;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #222;
  margin-top: 15px;
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  padding: 12px;
  border-radius: 50%;
  border: 1px solid #444;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="quote">
    “She took the leap and built her wings on the way down.”
  </div>

  <!-- SIMPLE CINEMATIC BIRD -->
  <svg class="bird" viewBox="0 0 200 200">

    <circle cx="100" cy="110" r="30" fill="white"/>
    <circle cx="120" cy="85" r="10" fill="white"/>

    <ellipse class="wing" cx="80" cy="110" rx="30" ry="18" fill="white"/>
    <ellipse class="wing" cx="120" cy="110" rx="30" ry="18" fill="white"/>

  </svg>

</div>

<!-- ABOUT ME (RESTORED) -->
<div class="section">
  <h2>About Me</h2>
  <p style="opacity:0.85;">
    Divya Prakash Mundkar<br>
    Computer Engineer rebuilding her craft.<br>
    I create interactive experiences using HTML, CSS & SVG.
  </p>
</div>

<!-- PROJECTS -->
<div class="section">
  <h2>My Creation</h2>

  <div class="card">
    <h3>My Wings</h3>
    <p>Cinematic SVG animation project</p>

    <a href="https://mdivya1910-a11y.github.io/My-wings/" target="_blank" style="color:#66ccff;">
      View Project →
    </a>
  </div>
</div>

<!-- FOOTER -->
<div class="section">
  <p style="opacity:0.6;">Built by M. Divya ✨</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btn">
🎵 click me
</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("btn");

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.innerText = "⏸ click me";
  } else {
    music.pause();
    btn.innerText = "🎵 click me";
  }
}
</script>

</body>
</html>
