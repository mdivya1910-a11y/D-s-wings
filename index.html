body {

  background: linear-gradient(
    180deg,
    #05070f 0%,

  color: white;
  font-family: system-ui, Arial;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

/* QUOTE */
.quote {
  font-size: clamp(18px, 2.5vw, 26px);
  opacity: 0.9;
  margin-bottom: 30px;
  max-width: 700px;
  padding: 0 20px;
}

/* BIRD */
.bird {
  width: 260px;
  animation: float 4.5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-16px) rotate(1deg); }
}

/* WINGS */
.wing-left {
  transform-origin: 100px 100px;
  animation: flapLeft 1.6s ease-in-out infinite;
}
.wing-right {
  transform-origin: 100px 100px;
  animation: flapRight 1.4s ease-in-out infinite;
}

@keyframes flapLeft {
  0%,100% { transform: rotate(-2deg); }
  50% { transform: rotate(18deg); }
}
@keyframes flapRight {
  0%,100% { transform: rotate(2deg); }
  50% { transform: rotate(-16deg); }
}

.section {
  padding: 60px 20px;

}

.card a {
  color: #66ccff;

}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}
