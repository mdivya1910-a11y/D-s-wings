<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #05060c;
  color: white;
  overflow-x: hidden;
}

/* ===================== */
/* LOADING CINEMATIC LOGO */
/* ===================== */

.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 2.5s ease forwards 2.5s;
}

.logo {
  font-size: 28px;
  letter-spacing: 6px;
  opacity: 0;
  animation: logoIn 2s ease forwards;
}

@keyframes logoIn {
  0% { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1.1); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* ===================== */
/* PARALLAX BACKGROUND   */
/* ===================== */

.layer {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.cloud {
  position: absolute;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  filter: blur(20px);
}

.c1 { width: 200px; height: 60px; top: 20%; left: -200px; animation: move 80s linear infinite; }
.c2 { width: 260px; height: 70px; top: 50%; left: -300px; animation: move 110s linear infinite; }
.c3 { width: 180px; height: 50px; top: 75%; left: -250px; animation: move 95s linear infinite; }

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(160vw); }
}

/* ===================== */
/* HERO SECTION          */
/* ===================== */

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.quote {
  font-size: 22px;
  opacity: 0;
  animation: fadeUp 2s ease forwards 3s;
  max-width: 700px;
  padding: 0 20px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 0.9; transform: translateY(0); }
}

/* ===================== */
/* CINEMATIC BIRD        */
/* ===================== */

.bird {
  width: 260px;
  opacity: 0;
  transform: scale(0.7);
  animation: birdIn 2s ease forwards 3.2s, float 4s ease-in-out infinite 5s;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.15));
}

@keyframes birdIn {
  to { opacity: 1; transform: scale(1); }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.wing {
  animation: flap 1.3s ease-in-out infinite;
  transform-origin: center;
}

@keyframes flap {
  0%,100% { transform: rotate(-6deg); }
  50% { transform: rotate(16deg); }
}

/* ===================== */
/* SECTIONS              */
/* ===================== */

.section {
  padding: 80px 20px;
  max-width: 900px;
  margin: auto;
  text-align: center;
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
}

/* ===================== */
/* MUSIC BUTTON          */
/* ===================== */

.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  padding: 12px 14px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  animation: pulse 2.5s infinite;
  z-index: 10;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.2); }
  50% { box-shadow: 0 0 20px 6px rgba(255,255,255,0.12); }
