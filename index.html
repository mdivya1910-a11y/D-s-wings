<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #05060c;
  color: white;
  overflow-x: hidden;
}

/* SAFE INTRO (NON-BLOCKING) */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: hideIntro 2.5s ease forwards;
}

@keyframes hideIntro {
  0% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

.logo {
  font-size: 28px;
  letter-spacing: 6px;
}

/* CLOUDS */
.cloud {
  position: fixed;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  filter: blur(18px);
}

.c1 { width: 200px; height: 60px; top: 20%; left: -200px; animation: move 90s linear infinite; }
.c2 { width: 260px; height: 70px; top: 50%; left: -300px; animation: move 120s linear infinite; }
.c3 { width: 180px; height: 50px; top: 75%; left: -250px; animation: move 100s linear infinite; }

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(160vw); }
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.quote {
  font-size: 20px;
  margin-bottom: 20px;
  opacity: 0.9;
}

/* BIRD */
.bird {
  width: 250px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.wing {
  animation: flap 1.4s ease-in-out infinite;
}

@keyframes flap {
  0%,100% { transform: rotate(-5deg); }
  50% { transform: rotate(15deg); }
}

/* SECTIONS (IMPORTANT FIX) */
.section {
  padding: 70px 20px;
  max-width: 900px;
  margin: auto;
  text-align: center;
  opacity: 1;              /* 🔥 FIX: visible by default */
  transform: none;         /* 🔥 FIX: no hidden state */
}

/* optional smooth effect */
@media (min-width: 0px) {
  .section {
    animation: fadeUp 1s ease;
  }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  padding: 12px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="logo">MY WINGS</div>
</div>

<!-- CLOUDS -->
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<!-- HERO -->
<div class="hero">
  <div class="quote">“She took the leap and built her wings on the way down.”</div>

  <svg class="bird" viewBox="0 0 200 200">
    <ellipse cx="100" cy="110" rx="26" ry="38" fill="white"/>
    <circle cx="122" cy="88" r="10" fill="white"/>
    <polygon points="132,88 148,92 132,96" fill="white"/>
    <circle cx="124" cy="86" r="2" fill="black"/>

    <ellipse class="wing" cx="80" cy="112" rx="32" ry="18" fill="white"/>
    <ellipse class="wing" cx="120" cy="112" rx="32" ry="18" fill="white"/>
  </svg>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Me</h2>
  <p>
    Divya Prakash Mundkar<br>
    Computer Engineer | Creative Developer
  </p>
</div>

<!-- PROJECT -->
<div class="section">
  <h2>My Creation</h2>
  <p>My Wings - Cinematic SVG Project</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btn">🎵</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("btn");

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.innerText = "⏸";
  } else {
    music.pause();
    btn.innerText = "🎵";
  }
}
</script>

</body>
</html>
