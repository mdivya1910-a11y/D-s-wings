<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
/* =========================
   BASE SYSTEM (APPLE CLEAN)
========================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, system-ui, Arial;
  background: radial-gradient(circle at top, #0b1020, #05060c 60%, #000);
  color: white;
  overflow-x: hidden;
}

/* =========================
   NETFLIX INTRO (SAFE)
========================= */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: introFade 2.8s ease forwards;
}

@keyframes introFade {
  0% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

.logo {
  font-size: 32px;
  letter-spacing: 10px;
  font-weight: 300;
  opacity: 0.9;
}

/* =========================
   ANDROID STYLE DEPTH LAYERS
========================= */
.layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(120,160,255,0.08);
  filter: blur(80px);
  border-radius: 50%;
}

.g1 { top: 10%; left: -100px; }
.g2 { top: 60%; right: -120px; }

/* CLOUDS (SOFT MOTION) */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  filter: blur(20px);
}

.c1 { width: 220px; height: 70px; top: 20%; left: -200px; animation: move 100s linear infinite; }
.c2 { width: 260px; height: 80px; top: 55%; left: -300px; animation: move 140s linear infinite; }

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(170vw); }
}

/* =========================
   HERO (APPLE STYLE SPACING)
========================= */
.hero {
  min-height: 92vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 60px 20px;
  position: relative;
  z-index: 2;
}

/* QUOTE */
.quote {
  font-size: clamp(18px, 2.2vw, 26px);
  opacity: 0.9;
  max-width: 720px;
  margin-bottom: 25px;
  animation: fadeUp 2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 0.9; transform: translateY(0); }
}

/* =========================
   CINEMATIC BIRD (CLEAN + PREMIUM)
========================= */
.bird {
  width: 270px;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.15));
  animation: float 5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.wing {
  animation: flap 1.5s ease-in-out infinite;
  transform-origin: center;
}

@keyframes flap {
  0%,100% { transform: rotate(-6deg); }
  50% { transform: rotate(16deg); }
}

/* =========================
   SECTIONS (APPLE CLEAN FLOW)
========================= */
.section {
  padding: 90px 20px;
  max-width: 900px;
  margin: auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

/* Android-style card */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 22px;
  backdrop-filter: blur(10px);
}

/* =========================
   NETFLIX STYLE BUTTON
========================= */
.music-btn {
  position: fixed;
  bottom: 22px;
  left: 22px;
  padding: 14px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  z-index: 10;
  transition: 0.3s ease;
}

.music-btn:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="logo">MY WINGS</div>
</div>

<!-- BACKGROUND LAYERS -->
<div class="layer">
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
</div>

<!-- HERO -->
<div class="hero">

  <div class="quote">
    “She took the leap and built her wings on the way down.”
  </div>

  <!-- CINEMATIC BIRD -->
  <svg class="bird" viewBox="0 0 200 200">

    <!-- body -->
    <ellipse cx="100" cy="110" rx="28" ry="40" fill="white"/>

    <!-- head -->
    <circle cx="125" cy="88" r="10" fill="white"/>

    <!-- beak -->
    <polygon points="135,88 150,92 135,96" fill="white"/>

    <!-- eye -->
    <circle cx="127" cy="86" r="2" fill="black"/>

    <!-- wings -->
    <ellipse class="wing" cx="80" cy="112" rx="34" ry="18" fill="white"/>
    <ellipse class="wing" cx="120" cy="112" rx="34" ry="18" fill="white"/>

  </svg>

</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Me</h2>
  <p>
    Divya Prakash Mundkar<br>
    Computer Engineer | Creative Developer<br>
    Building cinematic hybrid experiences.
  </p>
</div>

<!-- PROJECT -->
<div class="section">
  <h2>My Creation</h2>

  <div class="card">
    <h3>My Wings</h3>
    <p>Cinematic hybrid UI project</p>
  </div>
</div>

<!-- FOOTER -->
<div class="section">
  <p style="opacity:0.6;">Built by M. Divya ✨</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btn">
🎵 click me
</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("btn");

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.innerText = "⏸ click me";
  } else {
    music.pause();
    btn.innerText = "🎵 click me";
  }
}
</script>

</body>
</html>
