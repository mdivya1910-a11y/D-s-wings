<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings | Divya</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: system-ui, Arial;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* QUOTE */
.quote {
  font-size: clamp(18px, 2.5vw, 26px);
  opacity: 0.9;
  margin-bottom: 30px;
  max-width: 700px;
  padding: 0 20px;
}

/* BIRD */
.bird {
  width: 240px;
  animation: float 4.5s ease-in-out infinite;
}

/* FLOAT */
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-16px) rotate(1deg); }
}

/* WINGS */
.wing-left {
  transform-origin: 100px 100px;
  animation: flapLeft 1.7s ease-in-out infinite;
}

.wing-right {
  transform-origin: 100px 100px;
  animation: flapRight 1.5s ease-in-out infinite;
}

@keyframes flapLeft {
  0%,100% { transform: rotate(-2deg); }
  50% { transform: rotate(20deg); }
}

@keyframes flapRight {
  0%,100% { transform: rotate(2deg); }
  50% { transform: rotate(-18deg); }
}

/* SECTION */
.section {
  padding: 60px 20px;
  max-width: 900px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 12px;
  padding: 20px;
  border: 1px solid #222;
}

.card a {
  color: #66ccff;
  text-decoration: none;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 12px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  color: white;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

  <div class="quote">
    “She took the leap and built her wings on the way down.”
  </div>

  <!-- WHITE PIGEON -->
  <svg class="bird" viewBox="0 0 200 200">

    <!-- BODY -->
    <path d="M100 60
             C78 75, 72 110, 88 135
             C95 150, 105 150, 112 135
             C128 110, 122 75, 100 60"
          fill="white"/>

    <!-- HEAD -->
    <circle cx="112" cy="62" r="7" fill="white"/>

    <!-- BEAK -->
    <path d="M118 64 L128 68 L118 70 Z" fill="white"/>

    <!-- EYE -->
    <circle cx="114" cy="61" r="1.6" fill="black"/>
    <circle cx="115" cy="60" r="0.5" fill="white"/>

    <!-- LEFT WING -->
    <g class="wing-left">
      <path d="M92 95
               C40 70, 35 120, 88 120
               C60 110, 60 90, 92 95"
            fill="white" opacity="0.95"/>

      <path d="M90 105
               C55 90, 55 120, 88 118
               C65 112, 65 100, 90 105"
            fill="white" opacity="0.6"/>
    </g>

    <!-- RIGHT WING -->
    <g class="wing-right">
      <path d="M108 95
               C160 70, 165 120, 112 120
               C140 110, 140 90, 108 95"
            fill="white" opacity="0.95"/>

      <path d="M110 105
               C145 90, 145 120, 112 118
               C135 112, 135 100, 110 105"
            fill="white" opacity="0.6"/>
    </g>

    <!-- TAIL -->
    <path d="M88 135
             C70 140, 65 150, 85 150
             C90 145, 92 140, 88 135"
          fill="white" opacity="0.9"/>

  </svg>

</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Me</h2>
  <p style="text-align:center; opacity:0.8;">
    Divya Prakash Mundkar<br>
    Computer Engineer rebuilding her craft.<br>
    I create interactive experiences using HTML, CSS & SVG.
  </p>
</div>

<!-- PROJECT -->
<div class="section">
  <h2>Projects</h2>

  <div class="card">
    <h3>My Wings</h3>
    <p>Animated SVG cinematic pigeon project.</p>
    <a href="https://mdivya1910-a11y.github.io/My-wings/" target="_blank">
      View Project →
    </a>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  Built by M. Divya ✨
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()" id="btn">🎵</button>

<script>
const music = document.getElementById("music");
const btn = document.getElementById("btn");

music.volume = 0.3;

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.innerText = "⏸";
  } else {
    music.pause();
    btn.innerText = "🎵";
  }
}
</script>

</body>
</html>
